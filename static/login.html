<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Log in - Work Diary</title>
    <meta name="theme-color" content="#D85B56">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="/static/styles.css?v=20260718-archive-any-task">
  </head>
  <body class="login-body">
    <main class="login-shell">
      <section class="login-panel" aria-labelledby="loginTitle">
        <span class="brand-mark login-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false">
            <path d="M6 3h9l3 3v15H6z"></path>
            <path d="M15 3v4h4"></path>
            <path d="M9 11h6M9 15h6M9 19h4"></path>
          </svg>
        </span>
        <p class="eyebrow">Private diary</p>
        <h1 id="loginTitle">Work Diary</h1>
        <form class="login-form" id="loginForm">
          <label>
            Password
            <input id="passwordInput" type="password" autocomplete="current-password" required autofocus>
          </label>
          <button class="primary-button full-width" type="submit">Log in</button>
        </form>
        <p class="login-error" id="loginError" role="alert"></p>
      </section>
    </main>
    <script src="/config.js?v=20260718-archive-any-task"></script>
    <script>
      window.API_BASE_URL = ["localhost", "127.0.0.1"].includes(window.location.hostname)
        ? ""
        : (window.WORK_DIARY_CONFIG?.apiBaseUrl || "");
    </script>
    <script src="/static/login.js?v=20260718-archive-any-task"></script>
  </body>
</html>
