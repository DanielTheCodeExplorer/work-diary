<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Work Diary</title>
    <meta name="theme-color" content="#5DD4C0">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <header class="topbar" id="topbar">
      <div class="topbar-top">
        <a class="brand" href="/" aria-label="Work Diary home">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M6 3h9l3 3v15H6z"></path>
              <path d="M15 3v4h4"></path>
              <path d="M9 11h6M9 15h6M9 19h4"></path>
            </svg>
          </span>
          <span>Work Diary</span>
        </a>
        <div class="top-actions">
          <button class="icon-button" type="button" id="openCalendar" aria-label="Open calendar" title="Calendar">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M8 2v4M16 2v4"></path>
              <path d="M3 9h18"></path>
              <path d="M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"></path>
            </svg>
          </button>
          <button class="icon-button" type="button" id="openSettings" aria-label="Open display settings" title="Settings">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M4 21v-7"></path>
              <path d="M4 10V3"></path>
              <path d="M12 21v-9"></path>
              <path d="M12 8V3"></path>
              <path d="M20 21v-5"></path>
              <path d="M20 12V3"></path>
              <path d="M2 14h4"></path>
              <path d="M10 8h4"></path>
              <path d="M18 16h4"></path>
            </svg>
          </button>
          <button class="icon-button" type="button" id="logoutButton" aria-label="Log out" title="Log out">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <path d="M16 17l5-5-5-5"></path>
              <path d="M21 12H9"></path>
            </svg>
          </button>
        </div>
      </div>
      <nav class="tabs" aria-label="Primary views">
        <button class="tab active" type="button" data-view="dashboard">Dashboard</button>
        <button class="tab" type="button" data-view="planner">Planner</button>
        <button class="tab" type="button" data-view="diary">CV</button>
        <button class="tab" type="button" data-view="achievements">Achievements</button>
      </nav>
    </header>

    <main class="workspace">
      <section class="view active" id="dashboardView" aria-labelledby="dashboardHeading">
        <div class="section-head">
          <div>
            <p class="eyebrow">Review progress</p>
            <h1 id="dashboardHeading">Dashboard</h1>
          </div>
        </div>

        <section class="overview-grid" id="overviewCards" aria-label="Today summary"></section>

        <section class="dashboard-panel" aria-label="Recent progress">
          <div class="todo-head">
            <div>
              <p class="eyebrow">Recent progress</p>
              <h2>This week</h2>
            </div>
            <div class="section-actions">
              <button class="ghost-button hidden" type="button" id="restoreHiddenProgress">Show hidden</button>
              <button class="ghost-button" type="button" data-action="open-achievements">View achievements</button>
            </div>
          </div>
          <div class="progress-list" id="dashboardRecent"></div>
        </section>
      </section>

      <section class="view" id="plannerView" aria-labelledby="plannerHeading">
        <div class="section-head">
          <div>
            <p class="eyebrow">Plan work</p>
            <h1 id="plannerHeading">Planner</h1>
          </div>
        </div>

        <section class="todo-panel planner-panel" aria-label="Tasks">
          <div class="todo-head">
            <div>
              <p class="eyebrow">Open work</p>
              <h2>Planner</h2>
            </div>
            <span class="todo-count" id="todoCount">0 open</span>
          </div>
          <form class="task-form" id="taskForm">
            <label class="task-title-field">
              Task
              <input id="taskTitle" type="text" placeholder="Add a task" autocomplete="off" required>
            </label>
            <label>
              Due date
              <input id="taskDueDate" type="date">
            </label>
            <label>
              Due time
              <input id="taskDueTime" type="time">
            </label>
            <label>
              Priority
              <select id="taskPriority">
                <option value="">No priority</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
              </select>
            </label>
            <label>
              Repeat
              <select id="taskRepeatRule">
                <option value="none">No repeat</option>
                <option value="interval">Every set days</option>
              </select>
            </label>
            <label class="repeat-option hidden" id="taskRepeatIntervalWrap">
              Wait days
              <input id="taskRepeatIntervalDays" type="number" min="1" max="3650" step="1" value="1" inputmode="numeric">
            </label>
            <label class="repeat-option hidden" id="taskRepeatUntilWrap">
              Stop after
              <input id="taskRepeatUntil" type="date">
            </label>
            <button class="primary-button" type="submit">Add</button>
          </form>
          <div class="task-list" id="taskList"></div>
        </section>
      </section>

      <section class="view" id="taskDetailView" aria-labelledby="taskDetailHeading">
        <div class="section-head">
          <div>
            <p class="eyebrow">Planner list</p>
            <h1 id="taskDetailHeading">Inbox</h1>
          </div>
          <div class="section-actions">
            <span class="todo-count" id="taskDetailCount">0 open</span>
            <button class="ghost-button" type="button" id="backToPlanner">Back to planner</button>
          </div>
        </div>
        <div class="task-detail-list" id="taskDetailList"></div>
      </section>

      <section class="view" id="diaryView" aria-labelledby="diaryHeading">
        <div class="section-head">
          <div>
            <p class="eyebrow">Career evidence</p>
            <h1 id="diaryHeading">CV</h1>
          </div>
          <div class="searchbar">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="m21 21-4.3-4.3M10.8 18a7.2 7.2 0 1 1 0-14.4 7.2 7.2 0 0 1 0 14.4z"></path>
            </svg>
            <input id="searchInput" type="search" placeholder="Search CV notes">
          </div>
        </div>

        <form class="quick-strip" id="inlineQuickForm">
          <label for="inlineQuickNote">Journal entry</label>
          <div class="journal-meta-row">
            <label>
              Date
              <input id="inlineQuickDate" type="date">
            </label>
            <label>
              Project
              <input id="inlineQuickProject" type="text" placeholder="Optional">
            </label>
          </div>
          <div class="quick-row">
            <textarea id="inlineQuickNote" rows="5" placeholder="Write what happened, what you changed, what you learned, and what moved forward."></textarea>
            <button class="primary-button" type="submit">Save journal</button>
          </div>
        </form>

        <div class="entry-list" id="entryList"></div>
      </section>

      <section class="view" id="achievementsView" aria-labelledby="achievementsHeading">
        <div class="section-head">
          <div>
            <p class="eyebrow">Career log</p>
            <h1 id="achievementsHeading">Achievements</h1>
          </div>
          <div class="searchbar">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="m21 21-4.3-4.3M10.8 18a7.2 7.2 0 1 1 0-14.4 7.2 7.2 0 0 1 0 14.4z"></path>
            </svg>
            <input id="achievementSearchInput" type="search" placeholder="Search achievements, projects, skills">
          </div>
        </div>
        <div class="achievement-list" id="achievementList"></div>
      </section>

    </main>

    <nav class="bottom-nav" aria-label="Primary views">
      <button class="tab active" type="button" data-view="dashboard">
        <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
          <path d="M4 13h6V4H4z"></path>
          <path d="M14 20h6V4h-6z"></path>
          <path d="M4 20h6v-3H4z"></path>
        </svg>
        <span>Dashboard</span>
      </button>
      <button class="tab" type="button" data-view="planner">
        <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
          <path d="M9 11l3 3L22 4"></path>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
        </svg>
        <span>Planner</span>
      </button>
      <button class="tab" type="button" data-view="diary">
        <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
          <path d="M4 19.5V5a2 2 0 0 1 2-2h11l3 3v13.5a1.5 1.5 0 0 1-1.5 1.5H6a2 2 0 0 1-2-2z"></path>
          <path d="M16 3v4h4"></path>
          <path d="M8 11h8M8 15h8"></path>
        </svg>
        <span>CV</span>
      </button>
      <button class="tab" type="button" data-view="achievements">
        <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
          <path d="M8 3h8v6a4 4 0 0 1-8 0z"></path>
          <path d="M12 13v5"></path>
          <path d="M8 21h8"></path>
          <path d="M6 5H4a3 3 0 0 0 3 4"></path>
          <path d="M18 5h2a3 3 0 0 1-3 4"></path>
        </svg>
        <span>Achievements</span>
      </button>
    </nav>

    <aside class="drawer hidden" id="entryDrawer" aria-hidden="true">
      <div class="drawer-backdrop" data-action="close-drawer"></div>
      <section class="drawer-panel" aria-labelledby="drawerTitle">
        <header class="drawer-head">
          <div>
            <p class="eyebrow" id="drawerMode">New log</p>
            <h2 id="drawerTitle">Work entry</h2>
          </div>
          <button class="icon-button" type="button" data-action="close-drawer" aria-label="Close" title="Close">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M6 6l12 12M18 6 6 18"></path>
            </svg>
          </button>
        </header>

        <form class="photo-form" id="drawerPhotoForm">
          <div class="photo-choice-grid" id="photoChoiceGrid">
            <label class="photo-choice">
              <input id="drawerPhotoFile" type="file" accept="image/*">
              <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                <path d="M3 7h5l2 2h11v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <path d="M3 7V5a2 2 0 0 1 2-2h4l2 2h4"></path>
              </svg>
              <span>Files</span>
            </label>
            <label class="photo-choice">
              <input id="drawerPhotoCamera" type="file" accept="image/*" capture="environment">
              <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                <path d="M9 13a3 3 0 1 0 6 0 3 3 0 0 0-6 0z"></path>
              </svg>
              <span>Camera</span>
            </label>
          </div>
          <div class="selected-photo hidden" id="selectedPhotoName"></div>
          <div class="photo-details hidden" id="photoDetails">
            <label>
            Comment
              <textarea id="drawerPhotoComment" rows="4" placeholder="What does this show?"></textarea>
            </label>
            <div class="compact-grid">
              <label>
                Date
                <input id="drawerPhotoDate" type="date">
              </label>
              <label>
                Project
                <input id="drawerPhotoProject" type="text" placeholder="Optional">
              </label>
            </div>
            <button class="primary-button full-width" type="submit">Save image evidence</button>
          </div>
        </form>

        <form class="task-edit-form hidden" id="taskEditForm">
          <input id="editTaskId" type="hidden">
          <label>
            Task name
            <input id="editTaskTitle" type="text" autocomplete="off" required>
          </label>
          <div class="compact-grid">
            <label>
              Date
              <input id="editTaskDueDate" type="date">
            </label>
            <label>
              Time
              <input id="editTaskDueTime" type="time">
            </label>
          </div>
          <div class="compact-grid">
            <label>
              Priority
              <select id="editTaskPriority">
                <option value="">No priority</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
              </select>
            </label>
            <label>
              Repeat
              <select id="editTaskRepeatRule">
                <option value="none">No repeat</option>
                <option value="interval">Every set days</option>
              </select>
            </label>
            <label class="repeat-option hidden" id="editTaskRepeatIntervalWrap">
              Wait days
              <input id="editTaskRepeatIntervalDays" type="number" min="1" max="3650" step="1" value="1" inputmode="numeric">
            </label>
            <label class="repeat-option hidden" id="editTaskRepeatUntilWrap">
              Stop after
              <input id="editTaskRepeatUntil" type="date">
            </label>
          </div>
          <label>
            Project or list
            <input id="editTaskProject" type="text" placeholder="Final Project">
          </label>
          <label>
            Location
            <input id="editTaskLocation" type="text" placeholder="Library">
          </label>
          <label>
            Reminder
            <input id="editTaskReminder" type="datetime-local">
          </label>
          <label>
            Notes
            <textarea id="editTaskNotes" rows="4" placeholder="Anything useful to remember."></textarea>
          </label>
          <label class="toggle-row">
            <input id="editTaskCompleted" type="checkbox">
            <span>Completed</span>
          </label>
          <div class="form-actions">
            <button class="ghost-button danger" type="button" id="deleteTaskFromEditor">Delete</button>
            <button class="primary-button" type="submit">Save task</button>
          </div>
        </form>

        <form class="entry-form hidden" id="entryForm">
          <input id="entryId" type="hidden">
          <div class="compact-grid">
            <label>
              Date
              <input id="entryDate" type="date" required>
            </label>
            <label>
              Difficulty
              <select id="entryDifficulty">
                <option value="">Not set</option>
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
                <option value="stretch">Stretch</option>
              </select>
            </label>
          </div>
          <label>
            Title
            <input id="entryTitle" type="text" required placeholder="FastAPI authentication">
          </label>
          <label>
            What I did
            <textarea id="entryWhat" rows="5" required placeholder="Built login endpoints, fixed JWT expiry handling, and added tests."></textarea>
          </label>
          <label>
            Project
            <input id="entryProject" type="text" placeholder="Client portal">
          </label>
          <label>
            Skills used
            <input id="entrySkills" type="text" placeholder="FastAPI, JWT, Pytest">
          </label>
          <label>
            Outcome
            <textarea id="entryOutcome" rows="3" placeholder="Authentication flow now passes staging checks."></textarea>
          </label>
          <label>
            Evidence
            <div class="evidence-editor">
              <div class="compact-grid">
                <input id="evidenceTitle" type="text" placeholder="Evidence title">
                <select id="evidenceType"></select>
              </div>
              <input id="evidenceUrl" type="url" placeholder="https://...">
              <textarea id="evidenceDescription" rows="2" placeholder="Short description"></textarea>
              <button class="secondary-button" type="button" id="addEvidenceToEntry">Add evidence</button>
              <div class="mini-list" id="entryEvidenceList"></div>
            </div>
          </label>
          <label>
            Tags
            <input id="entryTags" type="text" placeholder="backend, debugging, security">
          </label>
          <label>
            Reflection notes
            <textarea id="entryReflection" rows="3" placeholder="What I learned or would improve next time."></textarea>
          </label>
          <label>
            CV bullet draft
            <textarea id="entryBullet" rows="3" placeholder="Draft from this CV note later."></textarea>
          </label>
          <div class="form-actions">
            <button class="ghost-button danger" type="button" id="deleteEntry">Delete</button>
            <button class="primary-button" type="submit">Save entry</button>
          </div>
        </form>
      </section>
    </aside>

    <aside class="drawer utility-drawer hidden" id="calendarDrawer" aria-hidden="true">
      <div class="drawer-backdrop" data-action="close-calendar"></div>
      <section class="drawer-panel utility-panel" aria-labelledby="calendarTitle">
        <header class="drawer-head">
          <div>
            <p class="eyebrow">Agenda</p>
            <h2 id="calendarTitle">Calendar</h2>
          </div>
          <button class="icon-button" type="button" data-action="close-calendar" aria-label="Close calendar" title="Close">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M6 6l12 12M18 6 6 18"></path>
            </svg>
          </button>
        </header>
        <div class="calendar-toolbar">
          <button class="ghost-button icon-text-button" type="button" id="calendarPrev">
            <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
              <path d="M15 18l-6-6 6-6"></path>
            </svg>
            <span>Previous</span>
          </button>
          <strong id="calendarMonthLabel"></strong>
          <button class="ghost-button icon-text-button" type="button" id="calendarNext">
            <span>Next</span>
            <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
              <path d="M9 18l6-6-6-6"></path>
            </svg>
          </button>
        </div>
        <div class="calendar-weekdays" aria-hidden="true">
          <span>Sun</span>
          <span>Mon</span>
          <span>Tue</span>
          <span>Wed</span>
          <span>Thu</span>
          <span>Fri</span>
          <span>Sat</span>
        </div>
        <div class="calendar-grid" id="calendarGrid" aria-label="Activity calendar"></div>
        <div class="calendar-agenda" id="calendarAgenda"></div>
      </section>
    </aside>

    <aside class="drawer utility-drawer hidden" id="settingsDrawer" aria-hidden="true">
      <div class="drawer-backdrop" data-action="close-settings"></div>
      <section class="drawer-panel utility-panel" aria-labelledby="settingsTitle">
        <header class="drawer-head">
          <div>
            <p class="eyebrow">Personalise</p>
            <h2 id="settingsTitle">Settings</h2>
          </div>
          <button class="icon-button" type="button" data-action="close-settings" aria-label="Close settings" title="Close">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M6 6l12 12M18 6 6 18"></path>
            </svg>
          </button>
        </header>
        <form class="settings-form" id="settingsForm">
          <label>
            Layout density
            <select id="settingDensity">
              <option value="comfortable">Comfortable</option>
              <option value="compact">Compact</option>
            </select>
          </label>
          <label>
            Task accent colour
            <input id="settingAccentColor" type="color" value="#5DD4C0">
          </label>
          <button class="secondary-button" type="button" id="resetAccentColor">Back to default accent</button>
          <label>
            Default landing page
            <select id="settingDefaultView">
              <option value="dashboard">Dashboard</option>
              <option value="planner">Planner</option>
              <option value="diary">CV</option>
              <option value="achievements">Achievements</option>
            </select>
          </label>
          <label class="toggle-row">
            <input id="settingShowTaskDetails" type="checkbox">
            <span>Show extra task details</span>
          </label>
          <label class="toggle-row">
            <input id="settingReducedMotion" type="checkbox">
            <span>Reduce motion</span>
          </label>
          <button class="ghost-button" type="button" id="resetSettings">Reset settings</button>
        </form>
      </section>
    </aside>

    <button class="fab" type="button" id="floatingQuickAdd" aria-label="Add image evidence" title="Add image evidence">
      <svg viewBox="0 0 24 24" focusable="false">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
        <path d="M9 13a3 3 0 1 0 6 0 3 3 0 0 0-6 0z"></path>
      </svg>
    </button>

    <div class="toast hidden" id="toast" role="status" aria-live="polite"></div>

    <script>
      window.API_BASE_URL = "https://xjs2kilr31.execute-api.eu-west-2.amazonaws.com";
    </script>
    <script src="/static/app.js"></script>
  </body>
</html>
