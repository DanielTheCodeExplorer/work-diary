AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Work Diary serverless backend with Lambda + DynamoDB

Parameters:
  AppPassword:
    Type: String
    NoEcho: true
    Description: Password for app login
  SessionSecret:
    Type: String
    NoEcho: true
    Description: Session signing secret
  OpenAIApiKey:
    Type: String
    NoEcho: true
    Description: OpenAI API key (optional; can be empty for fallback CV generation)
    Default: ""
  VapidPublicKey:
    Type: String
    Description: Web Push VAPID public key (optional until phone reminders are enabled)
    Default: ""
  VapidPrivateKey:
    Type: String
    NoEcho: true
    Description: Web Push VAPID private key (optional until phone reminders are enabled)
    Default: ""
  VapidSubject:
    Type: String
    Description: Contact subject for Web Push VAPID claims
    Default: "mailto:you@example.com"
  GoogleClientId:
    Type: String
    Description: Google OAuth client ID for Calendar and Tasks sync
    Default: ""
  GoogleClientSecret:
    Type: String
    NoEcho: true
    Description: Google OAuth client secret for Calendar and Tasks sync
    Default: ""
  GoogleRedirectUri:
    Type: String
    Description: Google OAuth redirect URI, usually the API endpoint plus /api/integrations/google/callback
    Default: ""
  AppFrontendUrl:
    Type: String
    Description: Work Diary frontend URL to return to after Google OAuth
    Default: ""

Globals:
  Function:
    Timeout: 60
    MemorySize: 512
    Runtime: python3.12
    Environment:
      Variables:
        APP_PASSWORD: !Ref AppPassword
        SESSION_SECRET: !Ref SessionSecret
        OPENAI_API_KEY: !Ref OpenAIApiKey
        OPENAI_MODEL: gpt-5.4-nano
        OPENAI_REASONING_EFFORT: low
        TASKS_TABLE: !Ref TasksTable
        ENTRIES_TABLE: !Ref EntriesTable
        EVIDENCE_TABLE: !Ref EvidenceTable
        ACHIEVEMENTS_TABLE: !Ref AchievementsTable
        PROJECTS_TABLE: !Ref ProjectsTable
        PUSH_SUBSCRIPTIONS_TABLE: !Ref PushSubscriptionsTable
        GOOGLE_INTEGRATION_TABLE: !Ref GoogleIntegrationTable
        UPLOADS_BUCKET: !Ref UploadsBucket
        UPLOADS_PREFIX: uploads/
        REMINDER_SCHEDULE_GROUP: !Ref ReminderScheduleGroup
        REMINDER_SCHEDULER_ROLE_ARN: !GetAtt ReminderSchedulerInvokeRole.Arn
        WORK_DIARY_FUNCTION_ARN: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:WorkDiaryAPI'
        VAPID_PUBLIC_KEY: !Ref VapidPublicKey
        VAPID_PRIVATE_KEY: !Ref VapidPrivateKey
        VAPID_SUBJECT: !Ref VapidSubject
        GOOGLE_CLIENT_ID: !Ref GoogleClientId
        GOOGLE_CLIENT_SECRET: !Ref GoogleClientSecret
        GOOGLE_REDIRECT_URI: !Ref GoogleRedirectUri
        APP_FRONTEND_URL: !Ref AppFrontendUrl

Resources:
  TasksTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: WorkDiaryTasks
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  EntriesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: WorkDiaryEntries
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  EvidenceTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: WorkDiaryEvidence
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  AchievementsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: WorkDiaryAchievements
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  ProjectsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: WorkDiaryProjects
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  PushSubscriptionsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: WorkDiaryPushSubscriptions
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  GoogleIntegrationTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: WorkDiaryGoogleIntegration
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  UploadsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  ReminderScheduleGroup:
    Type: AWS::Scheduler::ScheduleGroup
    Properties:
      Name: work-diary-reminders

  ReminderSchedulerInvokeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeWorkDiaryLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:WorkDiaryAPI'

  WorkDiaryLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Scan
                  - dynamodb:Query
                Resource:
                  - !GetAtt TasksTable.Arn
                  - !GetAtt EntriesTable.Arn
                  - !GetAtt EvidenceTable.Arn
                  - !GetAtt AchievementsTable.Arn
                  - !GetAtt ProjectsTable.Arn
                  - !GetAtt PushSubscriptionsTable.Arn
                  - !GetAtt GoogleIntegrationTable.Arn
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                Resource:
                  - !Sub '${UploadsBucket.Arn}/uploads/*'
              - Effect: Allow
                Action:
                  - scheduler:CreateSchedule
                  - scheduler:UpdateSchedule
                  - scheduler:DeleteSchedule
                  - scheduler:GetSchedule
                Resource:
                  - !Sub 'arn:aws:scheduler:${AWS::Region}:${AWS::AccountId}:schedule/${ReminderScheduleGroup}/*'
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource:
                  - !GetAtt ReminderSchedulerInvokeRole.Arn

  WorkDiaryFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      FunctionName: WorkDiaryAPI
      CodeUri: .
      Handler: lambda_backend.lambda_handler
      Role: !GetAtt WorkDiaryLambdaRole.Arn
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref WorkDiaryApi
            Path: /{proxy+}
            Method: ANY
        RootEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref WorkDiaryApi
            Path: /
            Method: ANY

  DailySummarySchedule:
    Type: AWS::Scheduler::Schedule
    DependsOn:
      - WorkDiaryFunction
    Properties:
      GroupName: !Ref ReminderScheduleGroup
      Name: work-diary-daily-summary
      Description: Work Diary daily task summary at midnight Europe/London
      ScheduleExpression: cron(0 0 * * ? *)
      ScheduleExpressionTimezone: Europe/London
      FlexibleTimeWindow:
        Mode: "OFF"
      State: ENABLED
      Target:
        Arn: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:WorkDiaryAPI'
        RoleArn: !GetAtt ReminderSchedulerInvokeRole.Arn
        Input: '{"source":"work-diary.reminders","action":"daily_summary"}'

  WorkDiaryApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Name: WorkDiaryAPI
      CorsConfiguration:
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowOrigins:
          - '*'

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${WorkDiaryApi}.execute-api.${AWS::Region}.amazonaws.com'
  TasksTableName:
    Description: DynamoDB Tasks table name
    Value: !Ref TasksTable
  EntriesTableName:
    Description: DynamoDB Entries table name
    Value: !Ref EntriesTable
  EvidenceTableName:
    Description: DynamoDB Evidence table name
    Value: !Ref EvidenceTable
  AchievementsTableName:
    Description: DynamoDB Achievements table name
    Value: !Ref AchievementsTable
  ProjectsTableName:
    Description: DynamoDB Projects table name
    Value: !Ref ProjectsTable
  PushSubscriptionsTableName:
    Description: DynamoDB Push subscriptions table name
    Value: !Ref PushSubscriptionsTable
  GoogleIntegrationTableName:
    Description: DynamoDB Google integration table name
    Value: !Ref GoogleIntegrationTable
  UploadsBucketName:
    Description: S3 bucket for uploaded image evidence
    Value: !Ref UploadsBucket
