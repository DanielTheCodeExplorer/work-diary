name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: aws-actions/setup-sam@v2
      - run: python -m pip install --requirement requirements.txt
      - run: python -m unittest discover -s tests -v
      - run: node --check static/app.js
      - run: node --check static/login.js
      - run: bash -n scripts/verify_cloudshell.sh
      - run: sam validate --lint
      - run: sam build
      - name: Verify Lambda artifact boundary
        run: |
          artifact=.aws-sam/build/WorkDiaryFunction
          test -f "$artifact/lambda_backend.py"
          test -f "$artifact/task_schedule.py"
          test -f "$artifact/integration_security.py"
          test ! -e "$artifact/app.py"
          test ! -e "$artifact/data"
          test ! -e "$artifact/static"
          test ! -e "$artifact/tests"
          test ! -e "$artifact/.env"
